name: Android CI

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - ".github/**"
      - "!.github/workflows/**"
      - ".idea/"
      - "assets/"
      - "metadata/"
      - '.gitignore'
      - "*.md"
      - "LICENSE.txt"
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - ".github/**"
      - "!.github/workflows/**"
      - ".idea/"
      - "assets/"
      - "metadata/"
      - '.gitignore'
      - "*.md"
      - "LICENSE.txt"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'zulu'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lint

  build:
    needs: check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: 'zulu'
        cache: gradle

    - name: Create files for signing
      env:
        SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        SIGNING_PROPERTIES: ${{ secrets.SIGNING_PROPERTIES }}
      run: |
        echo $SIGNING_KEY | base64 -di > ./booming_keystore.jks
        echo $SIGNING_PROPERTIES | base64 -di > ./keystore.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      if: github.event_name != 'pull_request'
      run: ./gradlew assembleRelease
      env:
        RELEASE_TYPE: "CI"

    - name: Build with Gradle for pull request
      if: github.event_name == 'pull_request'
      run: ./gradlew assembleDebug

    - name: Create Changelog
      id: changelog
      if: github.event_name != 'pull_request'
      uses: actions/github-script@v9
      env:
        COMMITS: ${{ toJSON(github.event.commits) }}
      with:
        result-encoding: string
        script: |
          const commits = JSON.parse(process.env.COMMITS);

          return commits
            .map(commit => `- ${commit.message.split("\n")[0]}`)
            .join("\n");

    - name: Find APK (CI build)
      if: github.event_name != 'pull_request'
      run: |
        APK_PATH=$(find app/build/outputs/apk/normal/release -name '*.apk')
        echo "APK_FILE=$APK_PATH" >> $GITHUB_ENV
        echo "APK_FILE_NAME=$(basename $APK_PATH .apk)" >> $GITHUB_ENV

    - name: Find APK (PR)
      if: github.event_name == 'pull_request'
      run: |
        APK_PATH=$(find app/build/outputs/apk/normal/debug -name '*.apk')
        echo "APK_FILE=$APK_PATH" >> $GITHUB_ENV
        echo "APK_FILE_NAME=$(basename $APK_PATH .apk)" >> $GITHUB_ENV

    - name: Send files to Telegram
      if: github.event_name != 'pull_request'
      uses: xz-dev/TelegramFileUploader@v1
      with:
        to-who: ${{ secrets.TG_CHAT_ID }}
        message: |
          📋 **Changelog:**
          ${{ env.CHANGELOG }}
        files: |
          ${{ env.APK_FILE }}
      env:
        CHANGELOG: ${{ steps.changelog.outputs.result }}
        API_ID: ${{ secrets.TG_API_ID }}
        API_HASH: ${{ secrets.TG_API_HASH }}
        BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}

    - name: Upload apk (CI build)
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.APK_FILE_NAME }}
        path: ${{ env.APK_FILE }}
        archive: false

    - name: Upload apk (PR)
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.APK_FILE_NAME }}
        path: ${{ env.APK_FILE }}